name: Setup pnpm + Node
description: >-
  Installs pnpm and Node (with pnpm-store cache) and runs a frozen-lockfile
  install in the given working directory. Shared by the Nx and Playwright
  reusable workflows.

inputs:
  working-directory:
    description: Directory containing package.json / pnpm-lock.yaml
    required: false
    default: frontend
  node-version:
    description: Node.js version
    required: false
    default: "22"
  pnpm-version:
    description: >-
      pnpm major version. Ignored automatically when the working directory's
      package.json declares a packageManager field (pnpm/action-setup rejects
      having both).
    required: false
    default: "11"
  install:
    description: Whether to run `pnpm install --frozen-lockfile`
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Detect packageManager field
      id: pm
      shell: bash
      run: |
        if grep -q '"packageManager"' "${{ inputs.working-directory }}/package.json" 2>/dev/null; then
          echo "declared=true" >> "$GITHUB_OUTPUT"
        else
          echo "declared=false" >> "$GITHUB_OUTPUT"
        fi

    - uses: pnpm/action-setup@v6
      if: steps.pm.outputs.declared == 'true'

    - uses: pnpm/action-setup@v6
      if: steps.pm.outputs.declared == 'false'
      with:
        version: ${{ inputs.pnpm-version }}

    - uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
        cache-dependency-path: ${{ inputs.working-directory }}/pnpm-lock.yaml

    - name: Install dependencies
      if: ${{ inputs.install == 'true' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: pnpm install --frozen-lockfile
