name: Setup pnpm + Node
description: >-
  Installs pnpm and Node (with pnpm-store cache) and runs a frozen-lockfile
  install in the given working directory. Shared by the Nx and Playwright
  reusable workflows.

inputs:
  working-directory:
    description: Directory containing package.json / pnpm-lock.yaml
    required: false
    default: frontend
  node-version:
    description: Node.js version
    required: false
    default: "22"
  pnpm-version:
    description: >-
      Exact pnpm version. Ignored automatically when the repository-root
      package.json declares a pnpm packageManager version.
      Pinned to an exact version (not the "11" major tag) for reproducibility.
    required: false
    default: "11.12.0"
  install:
    description: Whether to run `pnpm install --frozen-lockfile`
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: Install pnpm
      id: pnpm
      shell: bash
      run: |
        version="${{ inputs.pnpm-version }}"
        if [[ -f package.json ]]; then
          declared="$(node -p "const p=require('./package.json').packageManager || ''; p.startsWith('pnpm@') ? p.slice(5).split('+')[0] : ''")"
          if [[ -n "$declared" ]]; then
            version="$declared"
          fi
        fi
        npm install --global "pnpm@$version"
        echo "Installed pnpm $(pnpm --version)"
        echo "store-path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

    - name: Cache pnpm store
      uses: actions/cache@v5
      with:
        path: ${{ steps.pnpm.outputs.store-path }}
        key: ${{ runner.os }}-pnpm-${{ hashFiles(format('{0}/pnpm-lock.yaml', inputs.working-directory)) }}
        restore-keys: ${{ runner.os }}-pnpm-

    - name: Install dependencies
      if: ${{ inputs.install == 'true' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: pnpm install --frozen-lockfile
