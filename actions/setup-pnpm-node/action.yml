name: Setup pnpm + Node
description: >-
  Installs pnpm and Node (with pnpm-store cache) and runs a frozen-lockfile
  install in the given working directory. Shared by the Nx and Playwright
  reusable workflows.

inputs:
  working-directory:
    description: Directory containing package.json / pnpm-lock.yaml
    required: false
    default: frontend
  node-version:
    description: Node.js version
    required: false
    default: "22"
  pnpm-version:
    description: >-
      Exact pnpm version. Ignored automatically when the REPO-ROOT
      package.json declares a packageManager field: pnpm/action-setup reads
      its default package_json_file at the workspace root (NOT the working
      directory) and rejects having both that field and a version input.
      Pinned to an exact version (not the "11" major tag): pnpm 11.12.0's
      self-installer throws "Cannot use 'in' operator to search for
      'integrity' in undefined", so resolving the latest 11.x broke every
      deploy on 2026-07-12. Bump deliberately after verifying a release.
    required: false
    default: "11.9.0"
  install:
    description: Whether to run `pnpm install --frozen-lockfile`
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Detect packageManager field
      id: pm
      shell: bash
      # pnpm/action-setup@v6 resolves packageManager from its
      # package_json_file input, which defaults to the REPO-ROOT
      # package.json — irrespective of our working-directory input. So the
      # root file is the one that decides whether passing a version input
      # would conflict (sneat-apps deploy run 29057096563: root declares
      # pnpm@11.0.9 while landings/package.json declares nothing).
      run: |
        if grep -q '"packageManager"' package.json 2>/dev/null; then
          echo "declared=true" >> "$GITHUB_OUTPUT"
        else
          echo "declared=false" >> "$GITHUB_OUTPUT"
        fi

    - uses: pnpm/action-setup@v6
      if: steps.pm.outputs.declared == 'true'

    - uses: pnpm/action-setup@v6
      if: steps.pm.outputs.declared == 'false'
      with:
        version: ${{ inputs.pnpm-version }}

    - uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
        cache-dependency-path: ${{ inputs.working-directory }}/pnpm-lock.yaml

    - name: Install dependencies
      if: ${{ inputs.install == 'true' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: pnpm install --frozen-lockfile
