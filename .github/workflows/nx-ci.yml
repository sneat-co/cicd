name: Nx CI (reusable)

# Reusable workflow: pnpm install + `nx run-many` over the given targets for an
# Nx workspace. Call from a consumer repo:
#
#   jobs:
#     frontend:
#       uses: sneat-co/cicd/.github/workflows/nx-ci.yml@main
#       with:
#         working-directory: frontend
#         targets: "lint build"
#         coverage-command: pnpm exec vitest run --coverage --coverage.reporter=lcov
#         minimum-coverage: 20
#         artifact-name: frontend-dist
#         artifact-paths: frontend/dist

on:
  workflow_call:
    inputs:
      working-directory:
        description: Directory containing the Nx workspace (package.json / pnpm-lock.yaml)
        type: string
        required: false
        default: frontend
      targets:
        description: Space-separated Nx targets passed to `nx run-many -t`
        type: string
        required: false
        default: "lint test build"
      node-version:
        type: string
        required: false
        default: "22"
      pnpm-version:
        type: string
        required: false
        default: "11.12.0"
      timeout-minutes:
        type: number
        required: false
        default: 20
      coverage-command:
        description: >-
          Command that runs tests with coverage from working-directory. Required
          when minimum-coverage is greater than zero.
        type: string
        required: false
        default: ""
      coverage-path:
        description: LCOV file or directory containing lcov.info files, relative to working-directory
        type: string
        required: false
        default: coverage
      minimum-coverage:
        description: Minimum aggregate line coverage percentage (0 disables the check)
        type: number
        required: false
        default: 0
      coverage-artifact-name:
        description: Optional name used to upload the LCOV report
        type: string
        required: false
        default: ""
      artifact-name:
        description: Optional immutable build artifact name
        type: string
        required: false
        default: ""
      artifact-paths:
        description: >-
          Newline-separated repository-relative files/directories to package.
          Required when artifact-name is set.
        type: string
        required: false
        default: ""
      artifact-on-main-only:
        description: Upload the build artifact only for refs/heads/main
        type: boolean
        required: false
        default: true
      artifact-retention-days:
        description: Number of days to retain the build artifact
        type: number
        required: false
        default: 14

jobs:
  nx:
    name: lint · test · build
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm + Node
        uses: sneat-co/cicd/actions/setup-pnpm-node@main
        with:
          working-directory: ${{ inputs.working-directory }}
          node-version: ${{ inputs.node-version }}
          pnpm-version: ${{ inputs.pnpm-version }}

      - name: Nx run-many
        working-directory: ${{ inputs.working-directory }}
        run: pnpm exec nx run-many -t ${{ inputs.targets }}

      - name: Require a coverage command when a threshold is configured
        if: ${{ inputs.minimum-coverage > 0 && inputs.coverage-command == '' }}
        run: |
          echo "::error::coverage-command is required when minimum-coverage is greater than zero"
          exit 1

      - name: Test with coverage
        if: ${{ inputs.minimum-coverage > 0 }}
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.coverage-command }}

      - name: Enforce test coverage threshold
        if: ${{ inputs.minimum-coverage > 0 }}
        uses: sneat-co/cicd/actions/check-lcov-coverage@main
        with:
          coverage-path: ${{ inputs.working-directory }}/${{ inputs.coverage-path }}
          minimum-percent: ${{ inputs.minimum-coverage }}

      - name: Upload coverage report
        if: ${{ inputs.minimum-coverage > 0 && inputs.coverage-artifact-name != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.coverage-artifact-name }}
          path: ${{ inputs.working-directory }}/${{ inputs.coverage-path }}
          if-no-files-found: error
          retention-days: 14

      - name: Package immutable build artifact
        if: ${{ inputs.artifact-name != '' && (!inputs.artifact-on-main-only || github.ref == 'refs/heads/main') }}
        uses: sneat-co/cicd/actions/package-build-artifact@main
        with:
          name: ${{ inputs.artifact-name }}
          paths: ${{ inputs.artifact-paths }}
          source-sha: ${{ github.sha }}
          retention-days: ${{ inputs.artifact-retention-days }}
