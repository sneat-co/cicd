name: Go CI (reusable)

# Reusable workflow: lint (gofmt + go vet), test and build a Go module.
# Call from a consumer repo:
#
#   jobs:
#     backend:
#       uses: sneat-co/cicd/.github/workflows/go-ci.yml@main
#       with:
#         working-directory: backend

on:
  workflow_call:
    secrets:
      GH_TOKEN:
        description: >-
          GitHub token used to authenticate private module fetches via git URL
          rewrite. Required when any direct or transitive dependency lives in a
          private GitHub repository. Leave unset for fully-public module graphs.
        required: false
    inputs:
      working-directory:
        description: Directory containing go.mod
        type: string
        required: false
        default: backend
      go-version-file:
        description: Path to the go.mod used to resolve the Go version
        type: string
        required: false
        default: ""
      gofmt:
        description: >-
          gofmt enforcement: 'error' fails the job on unformatted files,
          'warn' annotates them but passes, 'off' skips the check.
        type: string
        required: false
        default: error
      timeout-minutes:
        type: number
        required: false
        default: 15
      goprivate:
        description: >-
          Value for the GOPRIVATE environment variable, e.g.
          'github.com/sneat-co'. Required when fetching private modules.
          Must be paired with the GH_TOKEN secret.
        type: string
        required: false
        default: ""
      goprivate-git-host:
        description: >-
          Host (or host/org prefix) to rewrite for private module authentication,
          e.g. 'github.com/sneat-co'. Defaults to 'github.com' when goprivate
          is set and this input is omitted.
        type: string
        required: false
        default: ""

jobs:
  go:
    name: lint · test · build
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ inputs.go-version-file != '' && inputs.go-version-file || format('{0}/go.mod', inputs.working-directory) }}
          cache-dependency-path: ${{ inputs.working-directory }}/go.sum

      - name: Authenticate private Go modules
        if: ${{ inputs.goprivate != '' }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GOPRIVATE_GIT_HOST: ${{ inputs.goprivate-git-host != '' && inputs.goprivate-git-host || 'github.com' }}
        run: git config --global url."https://${GH_TOKEN}:x-oauth-basic@${GOPRIVATE_GIT_HOST}/".insteadOf "https://${GOPRIVATE_GIT_HOST}/"

      - name: Lint — gofmt
        if: ${{ inputs.gofmt != 'off' }}
        env:
          GOFMT_MODE: ${{ inputs.gofmt }}
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            if [ "$GOFMT_MODE" = "warn" ]; then
              echo "::warning::gofmt found unformatted files (non-blocking):"; echo "$unformatted"
            else
              echo "::error::gofmt found unformatted files:"; echo "$unformatted"; exit 1
            fi
          fi

      - name: Lint — go vet
        env:
          GOPRIVATE: ${{ inputs.goprivate }}
        run: go vet ./...

      - name: Test
        env:
          GOPRIVATE: ${{ inputs.goprivate }}
        run: go test ./...

      - name: Build
        env:
          GOPRIVATE: ${{ inputs.goprivate }}
        run: go build ./...
